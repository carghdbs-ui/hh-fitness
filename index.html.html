<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김홍혁 트레이너 | 식단관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f3ee;
  --green: #2d6a4f;
  --green-light: #52b788;
  --green-pale: #d8f3dc;
  --accent: #ff6b35;
  --gray1: #1c1c1c;
  --gray2: #2e2e2e;
  --gray3: #888;
  --gray4: #bbb;
  --card-bg: #161616;
  --border: rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── SPLASH ── */
#splash {
  position: fixed; inset:0; z-index:1000;
  background: var(--black);
  display: flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity .5s, visibility .5s;
}
#splash.hide { opacity:0; visibility:hidden; }
.splash-logo { font-family:'Bebas Neue',sans-serif; font-size:64px; color:var(--green-light); letter-spacing:4px; }
.splash-sub { font-size:13px; color:var(--gray3); letter-spacing:6px; margin-top:4px; }
.splash-bar {
  width:160px; height:2px; background:var(--gray2); margin-top:40px; border-radius:2px; overflow:hidden;
}
.splash-bar-fill { height:100%; width:0%; background:var(--green-light); animation: load 1.5s ease forwards; }
@keyframes load { to { width:100%; } }

/* ── SCREENS ── */
.screen { display:none; min-height:100vh; }
.screen.active { display:block; animation: fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }

/* ── HEADER ── */
.app-header {
  position: sticky; top:0; z-index:100;
  background: rgba(10,10,10,0.92); backdrop-filter:blur(16px);
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items:center; justify-content:space-between;
}
.logo-text { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--green-light); letter-spacing:2px; }
.header-sub { font-size:10px; color:var(--gray3); letter-spacing:3px; }
.avatar-btn {
  width:36px; height:36px; border-radius:50%;
  background: var(--green); border:none; cursor:pointer;
  font-size:16px; display:flex; align-items:center; justify-content:center;
  color:white; font-weight:700;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background: rgba(10,10,10,0.95); backdrop-filter:blur(16px);
  border-top: 1px solid var(--border);
  display: flex; padding: 8px 0 20px;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  background:none; border:none; cursor:pointer; color:var(--gray3);
  font-family:'Noto Sans KR',sans-serif; font-size:10px;
  transition: color .2s;
  padding: 6px 0;
}
.nav-btn.active { color:var(--green-light); }
.nav-btn svg { width:22px; height:22px; }

/* ── PROFILE SCREEN ── */
.profile-hero {
  background: linear-gradient(160deg, var(--green) 0%, var(--black) 60%);
  padding: 60px 24px 32px;
  text-align: center;
}
.profile-avatar {
  width:88px; height:88px; border-radius:50%;
  background: var(--green-light); margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  font-size:36px; font-weight:900; color:white;
  border: 3px solid rgba(255,255,255,0.2);
}
.profile-name { font-size:22px; font-weight:700; }
.profile-stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:12px; padding: 20px;
}
.stat-card {
  background:var(--card-bg); border-radius:16px;
  border:1px solid var(--border); padding:16px 12px; text-align:center;
}
.stat-val { font-size:24px; font-weight:700; color:var(--green-light); }
.stat-unit { font-size:11px; color:var(--gray3); }
.stat-label { font-size:12px; color:var(--gray4); margin-top:4px; }

.form-section { padding: 0 20px 20px; }
.form-card {
  background:var(--card-bg); border-radius:20px;
  border:1px solid var(--border); padding:20px;
}
.form-title { font-size:14px; font-weight:500; color:var(--gray4); margin-bottom:16px; letter-spacing:.05em; }
.input-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.input-group { display:flex; flex-direction:column; gap:6px; }
.input-group label { font-size:12px; color:var(--gray3); }
.input-group input {
  background: var(--gray1); border: 1px solid var(--border);
  border-radius:10px; padding:10px 14px;
  color:var(--white); font-family:'Noto Sans KR',sans-serif; font-size:14px;
  outline:none; transition:border-color .2s;
}
.input-group input:focus { border-color: var(--green-light); }
.save-btn {
  width:100%; padding:14px; border-radius:12px;
  background: var(--green); border:none; cursor:pointer;
  color:white; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700;
  margin-top:4px; transition: background .2s;
}
.save-btn:hover { background: var(--green-light); }

/* ── FEED SCREEN ── */
.feed-header-bar {
  padding: 20px 20px 8px;
  display:flex; align-items:center; justify-content:space-between;
}
.feed-date { font-size:13px; color:var(--gray3); }
.daily-summary {
  margin: 0 20px 16px;
  background: linear-gradient(135deg, var(--green) 0%, #1a4a32 100%);
  border-radius:20px; padding:18px 20px;
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
}
.ds-item { text-align:center; }
.ds-val { font-size:18px; font-weight:700; }
.ds-label { font-size:10px; color:rgba(255,255,255,0.7); margin-top:2px; }
.ds-kcal { color:#f9c74f; }
.ds-prot { color:#90e0ef; }
.ds-carb { color:#f8ad9d; }
.ds-fat  { color:#c77dff; }

.upload-btn-card {
  margin: 0 20px 20px;
  border: 2px dashed var(--green);
  border-radius:20px; padding:24px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  cursor:pointer; background:rgba(45,106,79,0.06); transition: background .2s;
}
.upload-btn-card:hover { background:rgba(45,106,79,0.15); }
.upload-icon { font-size:36px; }
.upload-label { font-size:14px; font-weight:500; color:var(--green-light); }
.upload-sub { font-size:12px; color:var(--gray3); }

/* Meal cards */
.meal-card {
  margin: 0 20px 16px;
  background:var(--card-bg); border-radius:20px;
  border:1px solid var(--border); overflow:hidden;
}
.meal-img {
  width:100%; aspect-ratio:4/3; object-fit:cover;
  background:#1a1a1a; display:flex; align-items:center; justify-content:center;
  font-size:40px; color:var(--gray2);
}
.meal-img img { width:100%; height:100%; object-fit:cover; }
.meal-body { padding:16px; }
.meal-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.meal-type-badge {
  background:var(--green); color:white;
  font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;
}
.meal-time { font-size:12px; color:var(--gray3); }
.meal-name { font-size:16px; font-weight:700; margin-bottom:12px; }
.macro-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px; }
.macro-chip {
  border-radius:10px; padding:8px 6px; text-align:center;
}
.macro-chip.kcal { background:rgba(249,199,79,0.12); border:1px solid rgba(249,199,79,0.25); }
.macro-chip.prot { background:rgba(144,224,239,0.1); border:1px solid rgba(144,224,239,0.25); }
.macro-chip.carb { background:rgba(248,173,157,0.1); border:1px solid rgba(248,173,157,0.25); }
.macro-chip.fat  { background:rgba(199,125,255,0.1); border:1px solid rgba(199,125,255,0.25); }
.macro-num { font-size:15px; font-weight:700; }
.macro-num.kcal { color:#f9c74f; }
.macro-num.prot { color:#90e0ef; }
.macro-num.carb { color:#f8ad9d; }
.macro-num.fat  { color:#c77dff; }
.macro-unit { font-size:10px; color:var(--gray3); }

/* Comments */
.comments-area { border-top:1px solid var(--border); padding-top:12px; }
.comment-item {
  display:flex; gap:10px; margin-bottom:10px;
}
.comment-avatar {
  width:28px; height:28px; border-radius:50%;
  background:var(--green); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
}
.comment-bubble {
  background:var(--gray1); border-radius:12px 12px 12px 4px;
  padding:8px 12px; flex:1;
}
.comment-author { font-size:11px; font-weight:700; color:var(--green-light); margin-bottom:3px; }
.comment-text { font-size:13px; line-height:1.5; color:var(--gray4); }
.comment-input-row {
  display:flex; gap:8px; margin-top:8px;
}
.comment-input {
  flex:1; background:var(--gray1); border:1px solid var(--border);
  border-radius:20px; padding:8px 14px; color:var(--white);
  font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none;
}
.comment-send {
  background:var(--green); border:none; border-radius:20px; padding:8px 16px;
  color:white; font-size:13px; cursor:pointer; font-weight:700;
}

/* Product recommendation */
.product-rec {
  margin:12px 0 0; border-radius:14px; overflow:hidden;
  border:1px solid rgba(255,107,53,0.3); background:rgba(255,107,53,0.06);
}
.product-rec-header {
  padding:8px 14px; background:rgba(255,107,53,0.15);
  font-size:11px; color:var(--accent); font-weight:700; letter-spacing:.05em;
}
.product-list { padding:10px 14px; display:flex; flex-direction:column; gap:8px; }
.product-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; background:var(--gray1); border-radius:10px;
  cursor:pointer; text-decoration:none;
  border:1px solid var(--border); transition:border-color .2s;
}
.product-item:hover { border-color:var(--accent); }
.product-emoji { font-size:22px; }
.product-info { flex:1; }
.product-name { font-size:13px; font-weight:500; color:var(--white); }
.product-desc { font-size:11px; color:var(--gray3); margin-top:2px; }
.product-arrow { font-size:16px; color:var(--accent); }

/* ── UPLOAD MODAL ── */
.modal-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
  display:none; align-items:flex-end; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal-sheet {
  background:var(--gray1); border-radius:28px 28px 0 0;
  width:100%; max-width:480px;
  padding:28px 24px 40px; animation:slideUp .3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
.modal-handle { width:40px; height:4px; background:var(--gray2); border-radius:2px; margin:0 auto 24px; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:20px; }
.photo-preview {
  width:100%; aspect-ratio:4/3; border-radius:16px;
  background:var(--gray2); border:2px dashed var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:48px; cursor:pointer; overflow:hidden; margin-bottom:16px;
}
.photo-preview img { width:100%; height:100%; object-fit:cover; }
.modal-form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.modal-input-group { display:flex; flex-direction:column; gap:6px; }
.modal-input-group label { font-size:12px; color:var(--gray3); }
.modal-input {
  background:var(--gray2); border:1px solid var(--border); border-radius:10px;
  padding:10px 14px; color:var(--white);
  font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none;
}
.modal-input:focus { border-color:var(--green-light); }
.modal-select {
  background:var(--gray2); border:1px solid var(--border); border-radius:10px;
  padding:10px 14px; color:var(--white);
  font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none;
  width:100%;
}
.analyze-btn {
  width:100%; padding:16px; border-radius:14px;
  background: linear-gradient(135deg, var(--green), var(--green-light));
  border:none; cursor:pointer; color:white;
  font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:700;
  margin-top:8px; transition:opacity .2s; position:relative; overflow:hidden;
}
.analyze-btn:disabled { opacity:.6; cursor:not-allowed; }
.analyzing-overlay {
  position:absolute; inset:0; background:inherit;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.spinner {
  width:18px; height:18px; border:2px solid rgba(255,255,255,0.3);
  border-top-color:white; border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* AI result card inside modal */
.ai-result {
  background:var(--gray2); border-radius:14px; padding:16px;
  margin-top:12px; border:1px solid rgba(82,183,136,0.3);
  display:none;
}
.ai-result.show { display:block; }
.ai-result-title { font-size:12px; color:var(--green-light); font-weight:700; letter-spacing:.05em; margin-bottom:10px; }
.ai-macro-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:10px; }
.ai-macro { text-align:center; }
.ai-macro-val { font-size:18px; font-weight:700; }
.ai-macro-label { font-size:10px; color:var(--gray3); margin-top:2px; }
.ai-comment { font-size:13px; color:var(--gray4); line-height:1.6; padding-top:10px; border-top:1px solid var(--border); }

.post-btn {
  width:100%; padding:14px; border-radius:14px;
  background: var(--accent); border:none; cursor:pointer; color:white;
  font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700;
  margin-top:10px;
}

/* ── SHOP SCREEN ── */
.shop-header { padding:24px 20px 16px; }
.shop-title { font-size:26px; font-weight:900; }
.shop-sub { font-size:13px; color:var(--gray3); margin-top:4px; }
.shop-section-title { font-size:13px; color:var(--gray3); padding:0 20px 12px; font-weight:500; letter-spacing:.05em; }
.shop-card {
  margin:0 20px 14px;
  background:var(--card-bg); border-radius:20px; overflow:hidden;
  border:1px solid var(--border);
  display:flex; cursor:pointer; text-decoration:none;
  transition:transform .15s, border-color .2s;
}
.shop-card:hover { transform:translateY(-2px); border-color:var(--green-light); }
.shop-card-emoji {
  width:88px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:36px; background:var(--gray1);
}
.shop-card-body { padding:16px; flex:1; }
.shop-card-title { font-size:15px; font-weight:700; margin-bottom:4px; }
.shop-card-desc { font-size:12px; color:var(--gray3); line-height:1.6; margin-bottom:10px; }
.shop-card-tag {
  display:inline-block; background:rgba(82,183,136,0.15); color:var(--green-light);
  font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px;
}
.shop-card-arrow { padding:16px 14px; display:flex; align-items:center; color:var(--accent); font-size:20px; }
.add-product-btn {
  margin:0 20px; width:calc(100% - 40px); padding:14px;
  border-radius:14px; background:var(--gray1); border:1px dashed var(--border);
  color:var(--gray3); font-family:'Noto Sans KR',sans-serif; font-size:14px;
  cursor:pointer; transition: all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
}
.add-product-btn:hover { border-color:var(--green-light); color:var(--green-light); }

/* Trainer mode banner */
.trainer-banner {
  margin:16px 20px;
  background:linear-gradient(135deg,#1a3a2a,#0f2419);
  border-radius:16px; padding:16px 20px;
  border:1px solid var(--green);
  display:flex; align-items:center; gap:14px;
}
.trainer-badge { font-size:28px; }
.trainer-info { flex:1; }
.trainer-label { font-size:11px; color:var(--green-light); font-weight:700; letter-spacing:.08em; }
.trainer-name { font-size:16px; font-weight:700; }
.trainer-toggle {
  background:var(--green); border:none; border-radius:8px;
  color:white; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer;
}

/* Notification dot */
.notif-dot {
  width:8px; height:8px; border-radius:50%; background:var(--accent);
  position:absolute; top:2px; right:2px;
}

/* Modal close */
.modal-close {
  position:absolute; top:20px; right:20px;
  background:none; border:none; color:var(--gray3);
  font-size:20px; cursor:pointer;
}

/* Hidden file input */
#fileInput { display:none; }

/* Toast */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--green); color:white; padding:10px 20px; border-radius:30px;
  font-size:13px; font-weight:500; opacity:0; transition:all .3s; z-index:999; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">HH FITNESS</div>
  <div class="splash-sub">김홍혁 트레이너</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*">

<!-- App Header -->
<div class="app-header" id="appHeader" style="display:none">
  <div>
    <div class="logo-text">HH FITNESS</div>
    <div class="header-sub">김홍혁 트레이너</div>
  </div>
  <button class="avatar-btn" id="avatarBtn">?</button>
</div>

<!-- ═══════════════════════════════════ FEED SCREEN -->
<div class="screen active" id="screen-feed">
  <div class="feed-header-bar">
    <div style="font-size:16px;font-weight:700">오늘의 식단</div>
    <div class="feed-date" id="todayDate"></div>
  </div>

  <!-- Daily summary -->
  <div class="daily-summary">
    <div class="ds-item">
      <div class="ds-val ds-kcal" id="sumKcal">0</div>
      <div class="ds-label">kcal</div>
    </div>
    <div class="ds-item">
      <div class="ds-val ds-prot" id="sumProt">0g</div>
      <div class="ds-label">단백질</div>
    </div>
    <div class="ds-item">
      <div class="ds-val ds-carb" id="sumCarb">0g</div>
      <div class="ds-label">탄수화물</div>
    </div>
    <div class="ds-item">
      <div class="ds-val ds-fat" id="sumFat">0g</div>
      <div class="ds-label">지방</div>
    </div>
  </div>

  <!-- Upload button -->
  <div class="upload-btn-card" onclick="openModal()">
    <div class="upload-icon">📸</div>
    <div class="upload-label">식단 사진 올리기</div>
    <div class="upload-sub">사진을 올리면 AI가 영양소를 분석해드려요</div>
  </div>

  <!-- Trainer banner -->
  <div class="trainer-banner">
    <div class="trainer-badge">💪</div>
    <div class="trainer-info">
      <div class="trainer-label">TRAINER MODE</div>
      <div class="trainer-name">김홍혁 트레이너</div>
    </div>
    <button class="trainer-toggle" id="trainerToggle" onclick="toggleTrainerMode()">댓글 달기</button>
  </div>

  <!-- Meal cards injected here -->
  <div id="mealList"></div>
</div>

<!-- ═══════════════════════════════════ PROFILE SCREEN -->
<div class="screen" id="screen-profile">
  <div class="profile-hero">
    <div class="profile-avatar" id="profileAvatar">?</div>
    <div class="profile-name" id="profileName">회원 정보를 입력하세요</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-top:6px">김홍혁 트레이너의 회원</div>
  </div>

  <div class="profile-stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statWeight">—</div>
      <div class="stat-unit">kg</div>
      <div class="stat-label">체중</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statHeight">—</div>
      <div class="stat-unit">cm</div>
      <div class="stat-label">키</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statBmi">—</div>
      <div class="stat-unit">BMI</div>
      <div class="stat-label">체질량</div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-card">
      <div class="form-title">내 정보 등록</div>
      <div class="input-row">
        <div class="input-group">
          <label>이름</label>
          <input type="text" id="inp_name" placeholder="홍길동">
        </div>
        <div class="input-group">
          <label>나이</label>
          <input type="number" id="inp_age" placeholder="30">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>키 (cm)</label>
          <input type="number" id="inp_height" placeholder="175">
        </div>
        <div class="input-group">
          <label>체중 (kg)</label>
          <input type="number" id="inp_weight" placeholder="70">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>목표 체중 (kg)</label>
          <input type="number" id="inp_goal_weight" placeholder="65">
        </div>
        <div class="input-group">
          <label>목표 칼로리</label>
          <input type="number" id="inp_goal_kcal" placeholder="1800">
        </div>
      </div>
      <button class="save-btn" onclick="saveProfile()">저장하기</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════ SHOP SCREEN -->
<div class="screen" id="screen-shop">
  <div class="shop-header">
    <div class="shop-title">트레이너 추천</div>
    <div class="shop-sub">김홍혁 트레이너가 직접 고른 제품들</div>
  </div>

  <div class="shop-section-title">🔥 추천 식품</div>
  <div id="shopList"></div>

  <div class="shop-section-title" style="margin-top:8px">➕ 관리자</div>
  <button class="add-product-btn" onclick="addProduct()">+ 트레이너가 제품 추가하기</button>
</div>

<!-- ═══════════════════════════════════ BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-feed" onclick="navigate('feed')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    식단 피드
  </button>
  <button class="nav-btn" id="nav-shop" onclick="navigate('shop')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    추천 제품
  </button>
  <button class="nav-btn" id="nav-profile" onclick="navigate('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    내 정보
  </button>

<!-- ═══════════════════════════════════ UPLOAD MODAL -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <div class="modal-title">식단 사진 올리기</div>

    <div class="photo-preview" id="photoPreview" onclick="triggerFile()">
      <span id="photoPlaceholder">📷</span>
    </div>

    <div class="modal-form-row">
      <div class="modal-input-group">
        <label>식사 종류</label>
        <select class="modal-select" id="mealType">
          <option>아침</option>
          <option>점심</option>
          <option>저녁</option>
          <option>간식</option>
        </select>
      </div>
      <div class="modal-input-group">
        <label>음식 이름 (선택)</label>
        <input class="modal-input" id="mealName" placeholder="예: 닭가슴살 샐러드">
      </div>
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="analyzeFood()">
      <span id="analyzeBtnText">🤖 AI 영양소 분석하기</span>
    </button>

    <div class="ai-result" id="aiResult">
      <div class="ai-result-title">⚡ AI 분석 결과</div>
      <div class="ai-macro-row">
        <div class="ai-macro"><div class="ai-macro-val ds-kcal" id="res_kcal">—</div><div class="ai-macro-label">kcal</div></div>
        <div class="ai-macro"><div class="ai-macro-val ds-prot" id="res_prot">—</div><div class="ai-macro-label">단백질</div></div>
        <div class="ai-macro"><div class="ai-macro-val ds-carb" id="res_carb">—</div><div class="ai-macro-label">탄수화물</div></div>
        <div class="ai-macro"><div class="ai-macro-val ds-fat" id="res_fat">—</div><div class="ai-macro-label">지방</div></div>
      </div>
      <div class="ai-comment" id="res_comment"></div>
      <button class="post-btn" onclick="postMeal()">식단 피드에 올리기</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let profile = JSON.parse(localStorage.getItem('hh_profile') || '{}');
let meals = JSON.parse(localStorage.getItem('hh_meals') || '[]');
let products = JSON.parse(localStorage.getItem('hh_products') || 'null') || [
  { emoji:'🍗', name:'닭가슴살 (냉동)', desc:'김홍혁 트레이너 추천 고단백 닭가슴살', tag:'단백질 보충', url:'https://naver.me/Gy3IvE1g' },
  { emoji:'🥤', name:'프로틴 쉐이크', desc:'운동 후 30분 이내 섭취 추천', tag:'회복 식품', url:'https://naver.me/Gy3IvE1g' },
  { emoji:'🥗', name:'샐러드 키트', desc:'칼로리 낮은 식사 대용 샐러드', tag:'다이어트 추천', url:'https://naver.me/Gy3IvE1g' },
];
let isTrainerMode = false;
let currentPhotoDataURL = null;
let pendingAnalysis = null;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
  document.getElementById('appHeader').style.display = 'flex';
  renderAll();
}, 1800);

function renderAll() {
  renderProfile();
  renderFeed();
  renderShop();
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navigate(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
}

// ═══════════════════════════════════════════════
// PROFILE
// ═══════════════════════════════════════════════
function renderProfile() {
  if (profile.name) {
    document.getElementById('profileName').textContent = profile.name + ' 회원님';
    document.getElementById('profileAvatar').textContent = profile.name[0];
    document.getElementById('avatarBtn').textContent = profile.name[0];
    document.getElementById('inp_name').value = profile.name || '';
    document.getElementById('inp_age').value = profile.age || '';
    document.getElementById('inp_height').value = profile.height || '';
    document.getElementById('inp_weight').value = profile.weight || '';
    document.getElementById('inp_goal_weight').value = profile.goal_weight || '';
    document.getElementById('inp_goal_kcal').value = profile.goal_kcal || '';
  }
  document.getElementById('statWeight').textContent = profile.weight || '—';
  document.getElementById('statHeight').textContent = profile.height || '—';
  if (profile.weight && profile.height) {
    const bmi = (profile.weight / ((profile.height/100)**2)).toFixed(1);
    document.getElementById('statBmi').textContent = bmi;
  }
}

function saveProfile() {
  profile = {
    name: document.getElementById('inp_name').value,
    age: document.getElementById('inp_age').value,
    height: parseFloat(document.getElementById('inp_height').value),
    weight: parseFloat(document.getElementById('inp_weight').value),
    goal_weight: parseFloat(document.getElementById('inp_goal_weight').value),
    goal_kcal: parseInt(document.getElementById('inp_goal_kcal').value),
  };
  localStorage.setItem('hh_profile', JSON.stringify(profile));
  renderProfile();
  showToast('✅ 정보가 저장되었습니다!');
  navigate('feed');
}

// ═══════════════════════════════════════════════
// FEED
// ═══════════════════════════════════════════════
function renderFeed() {
  // Daily totals
  const today = new Date().toDateString();
  const todayMeals = meals.filter(m => new Date(m.ts).toDateString() === today);
  const totals = todayMeals.reduce((a, m) => ({
    kcal: a.kcal + (m.kcal||0), prot: a.prot + (m.prot||0),
    carb: a.carb + (m.carb||0), fat: a.fat + (m.fat||0)
  }), {kcal:0, prot:0, carb:0, fat:0});
  document.getElementById('sumKcal').textContent = Math.round(totals.kcal);
  document.getElementById('sumProt').textContent = Math.round(totals.prot) + 'g';
  document.getElementById('sumCarb').textContent = Math.round(totals.carb) + 'g';
  document.getElementById('sumFat').textContent = Math.round(totals.fat) + 'g';

  // Meals
  const list = document.getElementById('mealList');
  if (meals.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--gray3);padding:40px 20px;font-size:14px">아직 식단 기록이 없어요<br>첫 번째 식단을 올려보세요! 🌱</div>';
    return;
  }
  list.innerHTML = [...meals].reverse().map((m, i) => mealCardHTML(m, meals.length - 1 - i)).join('');
}

function mealCardHTML(m, idx) {
  const timeStr = new Date(m.ts).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  const commentsHTML = (m.comments || []).map(c => `
    <div class="comment-item">
      <div class="comment-avatar" style="background:${c.isTrainer ? 'var(--accent)' : 'var(--green)'}">${c.isTrainer ? '💪' : (profile.name||'?')[0]}</div>
      <div class="comment-bubble">
        <div class="comment-author">${c.isTrainer ? '김홍혁 트레이너' : (profile.name||'회원')}</div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>
  `).join('');

  const productHTML = products.slice(0,2).map(p => `
    <a class="product-item" href="${p.url}" target="_blank" rel="noopener">
      <span class="product-emoji">${p.emoji}</span>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
      </div>
      <span class="product-arrow">→</span>
    </a>
  `).join('');

  const imgPart = m.photo
    ? `<div class="meal-img"><img src="${m.photo}" alt="식단 사진"></div>`
    : `<div class="meal-img" style="height:80px;font-size:28px;display:flex;align-items:center;justify-content:center;background:#111">🍽️</div>`;

  return `
    <div class="meal-card">
      ${imgPart}
      <div class="meal-body">
        <div class="meal-meta">
          <span class="meal-type-badge">${m.type}</span>
          <span class="meal-time">${timeStr}</span>
        </div>
        <div class="meal-name">${m.name || '식단 기록'}</div>
        <div class="macro-row">
          <div class="macro-chip kcal"><div class="macro-num kcal">${Math.round(m.kcal)}</div><div class="macro-unit">kcal</div></div>
          <div class="macro-chip prot"><div class="macro-num prot">${Math.round(m.prot)}g</div><div class="macro-unit">단백질</div></div>
          <div class="macro-chip carb"><div class="macro-num carb">${Math.round(m.carb)}g</div><div class="macro-unit">탄수화물</div></div>
          <div class="macro-chip fat"><div class="macro-num fat">${Math.round(m.fat)}g</div><div class="macro-unit">지방</div></div>
        </div>
        <div class="comments-area">
          <div id="comments_${idx}">${commentsHTML}</div>
          <div class="comment-input-row" style="${isTrainerMode ? '' : 'display:none'}">
            <input class="comment-input" id="cinput_${idx}" placeholder="트레이너 코멘트 달기...">
            <button class="comment-send" onclick="addComment(${idx})">전송</button>
          </div>
          <div class="comment-input-row" style="${!isTrainerMode ? '' : 'display:none'}">
            <input class="comment-input" id="minput_${idx}" placeholder="질문이나 메모를 남겨보세요...">
            <button class="comment-send" onclick="addMemberComment(${idx})">전송</button>
          </div>
        </div>
        <div class="product-rec">
          <div class="product-rec-header">🛒 김홍혁 트레이너 추천 제품</div>
          <div class="product-list">${productHTML}</div>
        </div>
      </div>
    </div>
  `;
}

function addComment(idx) {
  const realIdx = meals.length - 1 - idx;
  const input = document.getElementById('cinput_' + idx);
  const text = input.value.trim();
  if (!text) return;
  if (!meals[realIdx].comments) meals[realIdx].comments = [];
  meals[realIdx].comments.push({ text, isTrainer: true, ts: Date.now() });
  saveMeals();
  renderFeed();
  showToast('💪 코멘트가 달렸습니다!');
}

function addMemberComment(idx) {
  const realIdx = meals.length - 1 - idx;
  const input = document.getElementById('minput_' + idx);
  const text = input.value.trim();
  if (!text) return;
  if (!meals[realIdx].comments) meals[realIdx].comments = [];
  meals[realIdx].comments.push({ text, isTrainer: false, ts: Date.now() });
  saveMeals();
  renderFeed();
  showToast('✅ 메모가 추가됐어요!');
}

function saveMeals() {
  localStorage.setItem('hh_meals', JSON.stringify(meals));
}

function toggleTrainerMode() {
  isTrainerMode = !isTrainerMode;
  const btn = document.getElementById('trainerToggle');
  btn.textContent = isTrainerMode ? '모드 끄기' : '댓글 달기';
  btn.style.background = isTrainerMode ? 'var(--accent)' : 'var(--green)';
  showToast(isTrainerMode ? '💪 트레이너 모드 ON' : '회원 모드로 전환');
  renderFeed();
}

// ═══════════════════════════════════════════════
// UPLOAD + AI ANALYSIS
// ═══════════════════════════════════════════════
function openModal() {
  document.getElementById('uploadModal').classList.add('open');
  document.getElementById('aiResult').classList.remove('show');
  document.getElementById('photoPlaceholder').style.display = '';
  document.getElementById('analyzeBtnText').textContent = '🤖 AI 영양소 분석하기';
  document.getElementById('analyzeBtn').disabled = false;
  currentPhotoDataURL = null;
  pendingAnalysis = null;
  document.getElementById('mealName').value = '';
}

function closeModal() {
  document.getElementById('uploadModal').classList.remove('open');
}

function triggerFile() {
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    currentPhotoDataURL = ev.target.result;
    const preview = document.getElementById('photoPreview');
    document.getElementById('photoPlaceholder').style.display = 'none';
    let img = preview.querySelector('img');
    if (!img) { img = document.createElement('img'); preview.appendChild(img); }
    img.src = currentPhotoDataURL;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:16px;';
  };
  reader.readAsDataURL(file);
  this.value = '';
});

async function analyzeFood() {
  const btn = document.getElementById('analyzeBtn');
  const btnText = document.getElementById('analyzeBtnText');
  const mealName = document.getElementById('mealName').value || '음식';

  btn.disabled = true;
  btnText.innerHTML = '<span style="display:flex;align-items:center;gap:8px;justify-content:center"><span class="spinner"></span>AI 분석 중...</span>';

  try {
    const messages = [];
    if (currentPhotoDataURL) {
      const base64 = currentPhotoDataURL.split(',')[1];
      const mediaType = currentPhotoDataURL.split(';')[0].split(':')[1];
      messages.push({
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: `이 식단 사진을 분석해주세요. 음식명: "${mealName}". 반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트 없이 JSON만:
{"kcal":숫자,"prot":숫자,"carb":숫자,"fat":숫자,"comment":"한글로 3줄 이내 영양 조언"}` }
        ]
      });
    } else {
      messages.push({
        role: 'user',
        content: `"${mealName}"의 영양소를 분석해주세요. 반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트 없이 JSON만:
{"kcal":숫자,"prot":숫자,"carb":숫자,"fat":숫자,"comment":"한글로 3줄 이내 영양 조언"}`
      });
    }

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages
      })
    });

    const data = await resp.json();
    const text = data.content?.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    document.getElementById('res_kcal').textContent = Math.round(result.kcal);
    document.getElementById('res_prot').textContent = Math.round(result.prot) + 'g';
    document.getElementById('res_carb').textContent = Math.round(result.carb) + 'g';
    document.getElementById('res_fat').textContent = Math.round(result.fat) + 'g';
    document.getElementById('res_comment').textContent = result.comment;
    document.getElementById('aiResult').classList.add('show');
    pendingAnalysis = result;

  } catch (err) {
    // Fallback demo values
    const fallback = { kcal:450, prot:35, carb:42, fat:12, comment:'단백질 함량이 적절합니다. 탄수화물은 조금 줄이고 채소를 더 추가하면 더 균형 잡힌 식단이 될 거예요. 김홍혁 트레이너 추천 닭가슴살과 함께 드시면 효과가 더 좋아요!' };
    document.getElementById('res_kcal').textContent = fallback.kcal;
    document.getElementById('res_prot').textContent = fallback.prot + 'g';
    document.getElementById('res_carb').textContent = fallback.carb + 'g';
    document.getElementById('res_fat').textContent = fallback.fat + 'g';
    document.getElementById('res_comment').textContent = fallback.comment;
    document.getElementById('aiResult').classList.add('show');
    pendingAnalysis = fallback;
  }

  btnText.textContent = '✅ 분석 완료';
  btn.disabled = false;
}

function postMeal() {
  if (!pendingAnalysis) return;
  const meal = {
    type: document.getElementById('mealType').value,
    name: document.getElementById('mealName').value || document.getElementById('mealType').value,
    photo: currentPhotoDataURL,
    kcal: pendingAnalysis.kcal,
    prot: pendingAnalysis.prot,
    carb: pendingAnalysis.carb,
    fat: pendingAnalysis.fat,
    aiComment: pendingAnalysis.comment,
    comments: [],
    ts: Date.now()
  };
  meals.push(meal);
  saveMeals();
  closeModal();
  renderFeed();
  showToast('🎉 식단이 등록됐습니다!');
}

// ═══════════════════════════════════════════════
// SHOP
// ═══════════════════════════════════════════════
function renderShop() {
  const list = document.getElementById('shopList');
  list.innerHTML = products.map((p, i) => `
    <a class="shop-card" href="${p.url}" target="_blank" rel="noopener">
      <div class="shop-card-emoji">${p.emoji}</div>
      <div class="shop-card-body">
        <div class="shop-card-title">${p.name}</div>
        <div class="shop-card-desc">${p.desc}</div>
        <span class="shop-card-tag">${p.tag}</span>
      </div>
      <div class="shop-card-arrow">→</div>
    </a>
  `).join('');
}

function addProduct() {
  const emoji = prompt('제품 이모지를 입력하세요 (예: 🥩)') || '🛒';
  const name = prompt('제품명을 입력하세요');
  if (!name) return;
  const desc = prompt('제품 설명을 입력하세요') || '';
  const tag = prompt('태그를 입력하세요 (예: 단백질 보충)') || '추천';
  const url = prompt('구매 링크를 입력하세요') || 'https://naver.me/Gy3IvE1g';
  products.push({ emoji, name, desc, tag, url });
  localStorage.setItem('hh_products', JSON.stringify(products));
  renderShop();
  showToast('✅ 제품이 추가됐습니다!');
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('uploadModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
